<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Static background for OG cover images. Dark base + three decorative
  "blobs" bleeding in from the corners (pink top-left, coral + peach
  bottom-right). The blob geometry is lifted verbatim from the video-
  platform cover generator (originally a 1545x869 canvas); we crop ~29px
  off the top and bottom via the viewBox so it maps cleanly onto the
  1200x630 OG aspect ratio. This file is rasterised to a PNG at build time
  and composited behind the dynamic text by Satori — it never changes per
  page, so it is baked once rather than drawn per image.
-->
